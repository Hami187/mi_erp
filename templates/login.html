<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #020818;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(26, 54, 120, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(180, 100, 20, 0.3) 0%, transparent 40%),
                radial-gradient(ellipse at 60% 80%, rgba(10, 30, 80, 0.5) 0%, transparent 50%);
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #00aaff;
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) translateX(50px); opacity: 0; }
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logo .logo-text {
            font-size: 2.5rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 30px rgba(0, 150, 255, 0.8);
            letter-spacing: 4px;
        }

        .login-logo .logo-text span {
            color: #00aaff;
        }

        .login-logo .logo-subtitle {
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .login-card {
            background: rgba(5, 20, 50, 0.9);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 60px rgba(0, 100, 255, 0.15), inset 0 0 40px rgba(0, 100, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20%;
            right: 20%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00aaff, transparent);
            border-radius: 50%;
        }

        .login-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: rgba(255,255,255,0.8);
            margin-bottom: 25px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background: rgba(0, 30, 70, 0.6);
            border: 1px solid rgba(0, 150, 255, 0.2);
            border-radius: 10px;
            padding: 12px 15px 12px 40px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: rgba(0, 150, 255, 0.6);
            box-shadow: 0 0 20px rgba(0, 150, 255, 0.2);
            background: rgba(0, 40, 90, 0.6);
        }

        .form-input::placeholder {
            color: rgba(255,255,255,0.2);
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(0, 150, 255, 0.6);
            font-size: 1rem;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #0055cc, #0088ff);
            border: none;
            border-radius: 10px;
            padding: 13px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(0, 100, 255, 0.3);
            margin-top: 10px;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #0066dd, #00aaff);
            box-shadow: 0 0 40px rgba(0, 150, 255, 0.5);
            transform: translateY(-2px);
        }

        .error-msg {
            background: rgba(255, 60, 80, 0.1);
            border: 1px solid rgba(255, 60, 80, 0.3);
            border-radius: 10px;
            padding: 10px 15px;
            color: #ff3c50;
            font-size: 0.85rem;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="login-wrapper">
    <div class="login-logo">
        <div class="logo-text">MI<span>ERP</span></div>
        <div class="logo-subtitle">Sistema de gestión empresarial</div>
    </div>

    <div class="login-card">
        <div class="login-title">Iniciar Sesión</div>

        {% if form.errors %}
        <div class="error-msg">
            <i class="bi bi-exclamation-circle"></i>
            Usuario o contraseña incorrectos
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Usuario</label>
                <div class="input-wrapper">
                    <i class="bi bi-person input-icon"></i>
                    <input type="text" name="username" class="form-input" placeholder="Ingresa tu usuario" autofocus>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" name="password" class="form-input" placeholder="Ingresa tu contraseña">
                </div>
            </div>
            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right"></i> Ingresar
            </button>
        </form>
    </div>
</div>

<script>
    const container = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.classList.add('particle');
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDuration = (Math.random() * 15 + 10) + 's';
        p.style.animationDelay = (Math.random() * 10) + 's';
        p.style.width = (Math.random() * 3 + 1) + 'px';
        p.style.height = p.style.width;
        if (Math.random() > 0.7) p.style.background = '#ff8c00';
        container.appendChild(p);
    }
</script>

</body>
</html>
