{% extends 'base.html' %}

{% block title %}{{ titulo }} - Mi ERP{% endblock %}
{% block page_title %}{{ titulo }}{% endblock %}
{% block menu_inventario %}active{% endblock %}

{% block content %}

<div style="max-width:600px;">

    <a href="/inventario/" style="color:rgba(255,255,255,0.4); text-decoration:none; font-size:0.85rem;">
        <i class="bi bi-arrow-left"></i> Volver a Inventario
    </a>

    <div style="
        background: rgba(5,20,50,0.8);
        border: 1px solid rgba(255,140,0,0.2);
        border-radius: 16px;
        padding: 30px;
        margin-top: 20px;
        box-shadow: 0 0 30px rgba(200,100,0,0.1);
    ">
        <h4 style="color:#fff; margin-bottom:25px; font-weight:700;">{{ titulo }}</h4>

        <form method="post">
            {% csrf_token %}

            <div style="margin-bottom:18px;">
                <label style="display:block; color:rgba(255,255,255,0.5); font-size:0.8rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">Código</label>
                <input type="text" name="codigo" value="{{ producto.codigo }}" required style="
                    width:100%; background:rgba(0,30,70,0.6);
                    border:1px solid rgba(255,140,0,0.2); border-radius:10px;
                    padding:12px 15px; color:#fff; font-size:0.95rem; outline:none;
                " onfocus="this.style.borderColor='rgba(255,140,0,0.6)'" onblur="this.style.borderColor='rgba(255,140,0,0.2)'">
            </div>

            <div style="margin-bottom:18px;">
                <label style="display:block; color:rgba(255,255,255,0.5); font-size:0.8rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">Nombre</label>
                <input type="text" name="nombre" value="{{ producto.nombre }}" required style="
                    width:100%; background:rgba(0,30,70,0.6);
                    border:1px solid rgba(255,140,0,0.2); border-radius:10px;
                    padding:12px 15px; color:#fff; font-size:0.95rem; outline:none;
                " onfocus="this.style.borderColor='rgba(255,140,0,0.6)'" onblur="this.style.borderColor='rgba(255,140,0,0.2)'">
            </div>

            <div style="margin-bottom:18px;">
                <label style="display:block; color:rgba(255,255,255,0.5); font-size:0.8rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">Categoría</label>
                <select name="categoria" style="
                    width:100%; background:rgba(0,30,70,0.6);
                    border:1px solid rgba(255,140,0,0.2); border-radius:10px;
                    padding:12px 15px; color:#fff; font-size:0.95rem; outline:none;
                ">
                    {% for categoria in categorias %}
                    <option value="{{ categoria.pk }}" {% if producto.categoria.pk == categoria.pk %}selected{% endif %}>{{ categoria.nombre }}</option>
                    {% endfor %}
                </select>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:18px;">
                <div>
                    <label style="display:block; color:rgba(255,255,255,0.5); font-size:0.8rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">Precio Compra</label>
                    <input type="number" name="precio_compra" value="{{ producto.precio_compra }}" step="0.01" style="
                        width:100%; background:rgba(0,30,70,0.6);
                        border:1px solid rgba(255,140,0,0.2); border-radius:10px;
                        padding:12px 15px; color:#fff; font-size:0.95rem; outline:none;
                    " onfocus="this.style.borderColor='rgba(255,140,0,0.6)'" onblur="this.style.borderColor='rgba(255,140,0,0.2)'">
                </div>
                <div>
                    <label style="display:block; color:rgba(255,255,255,0.5); font-size:0.8rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">Precio Venta</label>
                    <input type="number" name="precio_venta" value="{{ producto.precio_venta }}" step="0.01" style="
                        width:100%; background:rgba(0,30,70,0.6);
                        border:1px solid rgba(255,140,0,0.2); border-radius:10px;
                        padding:12px 15px; color:#fff; font-size:0.95rem; outline:none;
                    " onfocus="this.style.borderColor='rgba(255,140,0,0.6)'" onblur="this.style.borderColor='rgba(255,140,0,0.2)'">
                </div>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:18px;">
                <div>
                    <label style="display:block; color:rgba(255,255,255,0.5); font-size:0.8rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">Stock</label>
                    <input type="number" name="stock" value="{{ producto.stock }}" style="
                        width:100%; background:rgba(0,30,70,0.6);
                        border:1px solid rgba(255,140,0,0.2); border-radius:10px;
                        padding:12px 15px; color:#fff; font-size:0.95rem; outline:none;
                    " onfocus="this.style.borderColor='rgba(255,140,0,0.6)'" onblur="this.style.borderColor='rgba(255,140,0,0.2)'">
                </div>
                <div>
                    <label style="display:block; color:rgba(255,255,255,0.5); font-size:0.8rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">Stock Mínimo</label>
                    <input type="number" name="stock_minimo" value="{{ producto.stock_minimo }}" style="
                        width:100%; background:rgba(0,30,70,0.6);
                        border:1px solid rgba(255,140,0,0.2); border-radius:10px;
                        padding:12px 15px; color:#fff; font-size:0.95rem; outline:none;
                    " onfocus="this.style.borderColor='rgba(255,140,0,0.6)'" onblur="this.style.borderColor='rgba(255,140,0,0.2)'">
                </div>
            </div>

            <div style="margin-bottom:25px;">
                <label style="display:block; color:rgba(255,255,255,0.5); font-size:0.8rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">Descripción</label>
                <textarea name="descripcion" rows="3" style="
                    width:100%; background:rgba(0,30,70,0.6);
                    border:1px solid rgba(255,140,0,0.2); border-radius:10px;
                    padding:12px 15px; color:#fff; font-size:0.95rem; outline:none; resize:none;
                " onfocus="this.style.borderColor='rgba(255,140,0,0.6)'" onblur="this.style.borderColor='rgba(255,140,0,0.2)'">{{ producto.descripcion }}</textarea>
            </div>

            <button type="submit" style="
                width:100%; background:linear-gradient(135deg, #cc6600, #ff8c00);
                border:none; border-radius:10px; padding:13px;
                color:#fff; font-size:1rem; font-weight:600;
                cursor:pointer; box-shadow:0 0 20px rgba(200,100,0,0.3);
                text-transform:uppercase; letter-spacing:1px;
            ">
                <i class="bi bi-check-circle"></i> Guardar
            </button>
        </form>
    </div>
</div>

{% endblock %}
